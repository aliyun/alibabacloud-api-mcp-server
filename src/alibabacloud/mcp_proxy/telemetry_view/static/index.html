<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alibaba Cloud Telemetry Viewer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <svg class="app-logo" viewBox="0 0 24 24" width="28" height="28">
                <path fill="currentColor" d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            <h1 class="app-title">Alibaba Cloud Plugin Telemetry Viewer</h1>
        </div>
        <div class="header-right">
            <span id="refresh-status" class="refresh-status" title="Auto-refresh">
                <span class="refresh-status-text">默认 30s 刷新一次</span>
                <span class="refresh-countdown" id="refresh-countdown">30s</span>
            </span>
            <button id="refresh-btn" class="btn-icon" title="Refresh now">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"/>
                    <polyline points="1 20 1 14 7 14"/>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                </svg>
            </button>
            <button id="theme-toggle" class="btn-icon" title="Toggle theme">
                <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20">
                    <circle cx="12" cy="12" r="5" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
                <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20">
                    <path fill="currentColor" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                </svg>
            </button>
        </div>
    </header>
    <main id="app">
        <div class="loading">Loading sessions...</div>
    </main>
    <script src="/static/app.js"></script>
</body>
</html>
